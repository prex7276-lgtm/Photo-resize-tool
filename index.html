<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prex Guru Exam Portal</title>
    <style>
        :root { --p-blue: #2c3e50; --s-blue: #3498db; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        header { background: var(--p-blue); color: white; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; border-bottom: 4px solid var(--s-blue); }
        .container { max-width: 700px; margin: 20px auto; padding: 15px; }
        
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .card { background: white; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-weight: bold; border-top: 4px solid var(--s-blue); transition: 0.2s; }
        .card:hover { transform: scale(1.02); background: var(--s-blue); color: white; }

        .quiz-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .option { padding: 12px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .option:hover { border-color: var(--s-blue); background: #f0f7ff; }
        
        #timer { font-size: 18px; font-weight: bold; color: var(--danger); text-align: right; margin-bottom: 10px; }
        .hidden { display: none; }
        .back-btn { background: #95a5a6; color: white; padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>PREX GURU TEST PORTAL</header>

<div class="container">
    <div id="home-page">
        <h3>एग्जाम चुनें:</h3>
        <div class="card-grid">
            <div class="card" onclick="showSubjects('Raj High Court')">Raj High Court</div>
            <div class="card" onclick="showSubjects('Raj Police')">Rajasthan Police</div>
            <div class="card" onclick="showSubjects('NEET')">NEET</div>
        </div>
    </div>

    <div id="subject-page" class="hidden">
        <button class="back-btn" onclick="showPage('home-page')">← वापस</button>
        <h3 id="selected-exam"></h3>
        <div class="card-grid" id="sub-list"></div>
    </div>

    <div id="topic-page" class="hidden">
        <button class="back-btn" onclick="showPage('subject-page')">← वापस</button>
        <h3 id="selected-sub"></h3>
        <div class="card-grid" id="topic-list"></div>
    </div>

    <div id="test-page" class="hidden">
        <div id="timer">समय: 20:00</div>
        <div class="quiz-box">
            <h4 id="q-count">सवाल 1/25</h4>
            <p id="q-text" style="font-size: 18px; font-weight: bold;"></p>
            <div id="options-box"></div>
        </div>
    </div>

    <div id="result-page" class="hidden">
        <div class="card" style="cursor: default;">
            <h2>परिणाम</h2>
            <p id="final-score" style="font-size: 20px;"></p>
            <button class="back-btn" style="background: #27ae60;" onclick="location.reload()">Home पर जाएं</button>
        </div>
    </div>
</div>

<script src="questions.js"></script>

<script>
    let currentQuestions = [];
    let qIndex = 0;
    let score = 0;
    let timer;

    function showPage(id) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function showSubjects(exam) {
        document.getElementById('selected-exam').innerText = exam;
        let subs = ["हिन्दी", "English", "Rajasthan GK"];
        let html = "";
        subs.forEach(s => html += `<div class="card" onclick="showTopics('${s}')">${s}</div>`);
        document.getElementById('sub-list').innerHTML = html;
        showPage('subject-page');
    }

    function showTopics(sub) {
        document.getElementById('selected-sub').innerText = sub;
        let topics = (sub === "हिन्दी") ? ["संधि", "समास", "पर्यायवाची"] : ["Topic 1", "Topic 2"];
        let html = "";
        topics.forEach(t => {
            for(let i=1; i<=20; i++) {
                html += `<div class="card" onclick="startTest('${sub}-${t}-${i}')">${t} - टेस्ट ${i}</div>`;
            }
        });
        document.getElementById('topic-list').innerHTML = html;
        showPage('topic-page');
    }

    function startTest(id) {
        currentQuestions = allQuestions[id] || [];
        if(currentQuestions.length === 0) return alert("इस टेस्ट के सवाल अभी अपडेट हो रहे हैं!");
        
        qIndex = 0; score = 0;
        showPage('test-page');
        loadQuestion();
        // Timer Logic (20 min)
        let time = 1200;
        timer = setInterval(() => {
            time--;
            let m = Math.floor(time/60), s = time%60;
            document.getElementById('timer').innerText = `समय: ${m}:${s<10?'0'+s:s}`;
            if(time <= 0) endTest();
        }, 1000);
    }

    function loadQuestion() {
        let q = currentQuestions[qIndex];
        document.getElementById('q-count').innerText = `सवाल ${qIndex+1}/${currentQuestions.length}`;
        document.getElementById('q-text').innerText = q.q;
        let html = "";
        q.options.forEach((o, i) => html += `<div class="option" onclick="checkAns(${i})">${o}</div>`);
        document.getElementById('options-box').innerHTML = html;
    }

    function checkAns(idx) {
        if(idx === currentQuestions[qIndex].correct) score++;
        qIndex++;
        if(qIndex < currentQuestions.length) loadQuestion(); else endTest();
    }

    function endTest() {
        clearInterval(timer);
        showPage('result-page');
        document.getElementById('final-score').innerText = `आपका स्कोर: ${score} / ${currentQuestions.length}`;
    }
</script>
</body>
</html>
